<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Reporte</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; padding: 20px; color: #333; }
        .contenedor { max-width: 500px; margin: 0 auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #d69e2e; }
        label { display: block; font-weight: bold; margin-top: 15px; margin-bottom: 5px; }
        input[type="date"], input[type="time"], input[type="text"], textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .btn-guardar { background-color: #d69e2e; color: white; border: none; padding: 12px; width: 100%; font-size: 16px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 20px; }
        .btn-guardar:hover { background-color: #b7791f; }
        .btn-cancelar { display: block; text-align: center; margin-top: 15px; color: #718096; text-decoration: none; }
        .btn-cancelar:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="contenedor">
        <h2>✏️ Editar Reporte #{{ reporte.id }}</h2>
        <p style="text-align: center; font-size: 0.9rem; color: #666;">Empresa: <strong>{{ reporte.empresa }}</strong></p>
        
        <form method="POST">
            <label>Fecha del Evento:</label>
            <input type="date" name="fecha" value="{{ reporte.fecha_ocurrencia }}" required>
            
            <label>Hora del Evento:</label>
            <input type="time" name="hora" value="{{ reporte.hora_ocurrencia }}" required>
            
            <label>Team (Solo SIMECAR):</label>
            <input type="text" name="team" value="{{ reporte.team or '' }}">
            
            <label>Sitio / Zonal (Condiciones):</label>
            <input type="text" name="sitio" value="{{ reporte.sitio_zonal or '' }}">
            
            <label>Descripción detallada:</label>
            <textarea name="descripcion" rows="5" required>{{ reporte.descripcion }}</textarea>
            
            <button type="submit" class="btn-guardar">💾 Guardar Cambios</button>
            <a href="/admin/dashboard" class="btn-cancelar">❌ Cancelar y volver</a>
        </form>
    </div>
</body>
</html>
